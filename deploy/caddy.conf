# Bloque de sitio para /etc/caddy/Caddyfile (añadir, nunca reemplazar).
# Caddy emite y renueva el certificado SSL automáticamente cuando el DNS
# tiendas.olcas.app apunta al VPS. Los websockets de Socket.IO pasan solos.
tiendas.olcas.app {
    log {
        output file /var/log/caddy/tiendasvirtuales.log {
            roll_size 10MB
            roll_keep 10
        }
        format json
    }

    encode gzip zstd

    reverse_proxy localhost:4000 {
        header_up X-Real-IP         {remote_host}
        header_up X-Forwarded-For   {remote_host}
        header_up X-Forwarded-Proto {scheme}
    }
}
