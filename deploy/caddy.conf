# Bloques de sitio para /etc/caddy/Caddyfile (añadir, nunca reemplazar).
# Caddy emite y renueva el certificado SSL automáticamente cuando el DNS
# apunta al VPS. Los websockets de Socket.IO pasan solos.
vendi.olcas.app {
    log {
        output file /var/log/caddy/tiendasvirtuales.log {
            roll_size 10MB
            roll_keep 10
        }
        format json
    }

    encode gzip zstd

    reverse_proxy localhost:4000
}

tiendas.olcas.app {
    redir https://vendi.olcas.app{uri} permanent
}
