name: Deploy a VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-tiendasvirtuales
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Cargar llave SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Desplegar en VPS
        # Primero se actualiza el repo y después se ejecuta deploy.sh, para
        # que corra siempre la versión recién pusheada (el script hace git
        # reset y no debe pisarse a sí mismo a mitad de ejecución).
        run: |
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cd /var/www/tiendasvirtuales && git fetch origin main && git reset --hard origin/main && bash deploy.sh"
